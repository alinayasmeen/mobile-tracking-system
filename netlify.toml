# netlify.toml – Netlify build configuration for this monorepo
[build]
  # Project root (repo root)
  base    = "."
  # Install frontend dependencies, then build the Next.js app
  command = "npm ci --prefix frontend && npm run build --prefix frontend"
  # The Next.js Runtime plugin reads the build output from .next itself
  publish = "frontend/.next"

[build.environment]
  # Use the same Node version you develop with (adjust if needed)
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
